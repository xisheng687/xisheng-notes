<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    {% assign canonical_url = page.canonical_url | default: site.data.canonicals[page.slug] %}
    {% if canonical_url %}
    <link rel="canonical" href="{{ canonical_url }}">
    {% else %}
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    {% if page.layout == "post" %}
    <meta name="robots" content="noindex,follow">
    {% endif %}
    {% endif %}
    <style>
      body {
        margin: 0;
        color: #222;
        background: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.78;
      }
      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 40px 20px 72px;
      }
      a { color: #0b57d0; }
      img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 28px auto 8px;
      }
      em {
        color: #6b7280;
        font-size: 0.85em;
      }
      h1, h2, h3 {
        line-height: 1.35;
      }
      h1 { margin-top: 0; }
      .meta {
        color: #6b7280;
        font-size: 14px;
        margin-bottom: 28px;
      }
      .note {
        border-left: 4px solid #d1d5db;
        padding-left: 14px;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <main>
      {{ content }}
    </main>
  </body>
</html>
